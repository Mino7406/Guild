plugins {
    id 'java'
    id 'application'
}

group 'bot'
version '1.0'

repositories {
    mavenCentral()
}

dependencies {
    // Discord JDA 라이브러리 (버전은 5.x.x 대를 사용합니다)
    implementation 'net.dv8tion:JDA:5.0.0-beta.21'
    
    // JSON 파일을 읽기 위한 Gson 라이브러리
    implementation 'com.google.code.gson:gson:2.10.1'
}

application {
    // 봇을 켤 때 가장 먼저 실행할 메인 클래스 지정
    mainClass = 'bot.App'
}

// 한글 깨짐 방지
tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}